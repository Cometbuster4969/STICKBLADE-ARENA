<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STICKBLADE ARENA — Replay</title>
<style>
  :root { --bg:#0d0e14; --panel:#161821; --line:#2a2d3c; --text:#e8eaf4;
          --dim:#969aac; --accent:#ffd65a; --red:#ff4646; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text);
         font-family:'Segoe UI', Arial, sans-serif; min-height:100vh;
         display:flex; flex-direction:column; align-items:center; padding:18px; }
  h1 { font-size:20px; letter-spacing:3px; margin-bottom:4px; }
  h1 .blade { color:var(--red); }
  .sub { color:var(--dim); font-size:12px; margin-bottom:12px; }
  .stage { position:relative; width:min(1280px, 96vw); }
  canvas { width:100%; display:block; border:1px solid var(--line);
           border-radius:10px; background:#10121a; }
  .controls { width:min(1280px,96vw); background:var(--panel);
              border:1px solid var(--line); border-radius:10px;
              margin-top:10px; padding:10px 14px; display:flex;
              gap:12px; align-items:center; flex-wrap:wrap; }
  button { background:#23263a; color:var(--text); border:1px solid var(--line);
           border-radius:8px; padding:7px 16px; font-size:14px; cursor:pointer; }
  button:hover { background:#2e3250; }
  button.primary { background:#3a3f63; }
  input[type=range] { flex:1; min-width:160px; accent-color:var(--accent); }
  select { background:#23263a; color:var(--text); border:1px solid var(--line);
           border-radius:8px; padding:6px 8px; }
  .time { font-variant-numeric:tabular-nums; color:var(--dim); font-size:13px;
          min-width:90px; text-align:right; }
  .meta { width:min(1280px,96vw); margin-top:10px; display:flex; gap:10px;
          flex-wrap:wrap; }
  .card { background:var(--panel); border:1px solid var(--line);
          border-radius:10px; padding:10px 14px; font-size:13px;
          color:var(--dim); flex:1; min-width:220px; }
  .card b { color:var(--text); }
  kbd { background:#23263a; border:1px solid var(--line); border-radius:4px;
        padding:1px 6px; font-size:11px; }
</style>
</head>
<body>
  <h1>STICK<span class="blade">BLADE</span> ARENA</h1>
  <div class="sub" id="subtitle">replay</div>
  <div class="stage"><canvas id="cv" width="1280" height="720"></canvas></div>
  <div class="controls">
    <button id="bPlay" class="primary">⏸ Pause</button>
    <button id="bRestart">⟲ Restart</button>
    <input type="range" id="scrub" min="0" max="100" value="0" step="1">
    <span class="time" id="time">0:00 / 0:00</span>
    <select id="speed">
      <option value="0.25">0.25×</option>
      <option value="0.5">0.5×</option>
      <option value="1" selected>1×</option>
      <option value="2">2×</option>
    </select>
  </div>
  <div class="meta">
    <div class="card" id="cardResult"><b>Result:</b> …</div>
    <div class="card"><b>Controls:</b> <kbd>Space</kbd> play/pause ·
      <kbd>←</kbd>/<kbd>→</kbd> step · drag slider to scrub</div>
  </div>

<script>
/*__PLAYER_JS__*/
</script>

const __DATA = /*__REPLAY_DATA__*/null;
if (!__DATA) document.body.innerHTML = "<h2 style='margin:40px'>No replay data embedded.</h2>";
else initPlayer(__DATA);
</script>
</body>
</html>
