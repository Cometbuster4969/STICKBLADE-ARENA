name: CI

# ---------------------------------------------------------------------------
# STICKBLADE ARENA — Continuous Integration
#
# Runs on every push to main + every PR. Six independent jobs run in parallel:
#
#   1. backend-tests        — Python 3.11/3.12/3.13 matrix
#                             compile check + smoke-run every weapon
#                             + full 24-turn mock match + test_phases suite
#   2. frontend-checks      — Node 20/22: install, lint-ish balance check,
#                             next build (catches SSR/hydration + type errors)
#   3. security             — Bandit static analysis + secret-scanning regex
#                             + confirm no .env or key files ever tracked
#   4. link-check           — validate all URLs in README + AGENTS.md respond
#   5. brains-payload-check — assert every model in ARENA_MODELS has a
#                             _reasoning_policy entry (or explicit skip)
#   6. summary              — depends on all above, prints green badge status
#
# Design goals:
#   - Runs in <5 min total (matrix parallelism)
#   - Zero external secrets required (uses mocks + skips LLM calls)
#   - Cache Python + Node deps for fast reruns
#   - Every job has a clear pass/fail signal; no "flaky" tests
#   - Fails loud on real regressions, ignores cosmetic drift
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger from Actions tab (useful when tweaking the workflow itself)
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same PR/branch —
# saves CI minutes and gives faster feedback on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: read-only unless a specific job upgrades it.
permissions:
  contents: read

jobs:
  # ==========================================================================
  # 1. BACKEND — Python compile + smoke matrix
  # ==========================================================================
  backend-tests:
    name: Backend (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.13 is production (HF Space Docker), 3.11/3.12 catch future-compat
        # regressions and give confidence the codebase isn't accidentally
        # depending on 3.13-only syntax.
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: stickblade/requirements.txt

      - name: Install system deps for pygame/pymunk
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 \
            libsdl2-ttf-2.0-0 libfreetype6

      - name: Install Python deps
        working-directory: stickblade
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit  # for security job (also useful here for lint)

      - name: Compile-check every .py file
        run: |
          python3 - <<'PY'
          import py_compile, pathlib, sys
          root = pathlib.Path("stickblade")
          failed = []
          for f in sorted(root.rglob("*.py")):
              try:
                  py_compile.compile(str(f), doraise=True)
                  print(f"OK  {f}")
              except py_compile.PyCompileError as e:
                  failed.append((f, str(e)))
                  print(f"FAIL {f}: {e}")
          if failed:
              sys.exit(f"\n{len(failed)} files failed to compile")
          PY

      - name: Import-check the whole backend
        working-directory: stickblade
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          python3 -c "
          import pygame; pygame.init(); pygame.display.set_mode((10,10))
          import config, brains, main, joint_mode, weapons, ragdoll
          import combat, moves, recorder, storage, security
          import storage_supabase, server, tournament
          print('all modules import clean')
          "

      - name: Smoke — all 5 weapons construct + finish a mock match
        working-directory: stickblade
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          python3 -c "
          import pygame; pygame.init(); pygame.display.set_mode((10,10))
          from main import Match
          from render import FX
          zones = {'sword':['tip'], 'dagger':['tip'], 'spear':['tip'],
                   'flail':['ball'], 'bow':['arrowhead']}
          for w, zs in zones.items():
              m = Match('mock:berserker', 'mock:duelist', zs, FX(), weapon=w)
              frames = 0
              while m.phase != Match.PH_OVER and frames < 60 * 90:
                  m.update(1/60, False); frames += 1
              assert m.phase == Match.PH_OVER, f'{w} match did not terminate'
              print(f'  {w:6s} OK  winner={m.winner!r:<40} turns={m.turn} hp=({m.f1.hp:.0f},{m.f2.hp:.0f})')
          print('all 5 weapons complete matches cleanly')
          "

      - name: Smoke — all 3 arenas construct + finish
        working-directory: stickblade
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          python3 -c "
          import pygame; pygame.init(); pygame.display.set_mode((10,10))
          from main import Match
          from render import FX
          for arena in ('normal', 'ice', 'low_gravity'):
              m = Match('mock:berserker', 'mock:duelist', ['tip'], FX(),
                        weapon='sword', arena=arena)
              frames = 0
              while m.phase != Match.PH_OVER and frames < 60 * 90:
                  m.update(1/60, False); frames += 1
              assert m.phase == Match.PH_OVER, f'{arena} match did not terminate'
              # Ice bumps damping, verify:
              expected_damping = 0.996 if arena == 'ice' else 0.99
              assert abs(m.space.damping - expected_damping) < 0.001, \
                  f'{arena}: damping {m.space.damping} != {expected_damping}'
              print(f'  arena={arena:12s} OK  damping={m.space.damping}')
          print('all 3 arenas verified with correct physics params')
          "

      - name: Storage regression — self-play + normal vote deltas
        working-directory: stickblade
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          python3 -c "
          import tempfile, pygame
          pygame.init(); pygame.display.set_mode((10,10))
          from storage import LocalStorage
          s = LocalStorage(root=tempfile.mkdtemp())

          # Self-play must return 0 Elo delta + 1 draw
          A = 'meta-llama/llama-3.3-70b-instruct:free'
          mid = s.create_match(A, A, ['tip'], blind=True, weapon='sword')
          s.set_flip(mid, False)
          s.finish_match(mid, 'a', 'kill', 15,
                         {'meta':{},'frames':[],'events':[],'thoughts':[]})
          r = s.record_vote(mid, 'a')
          assert r['elo_change'][A] == 0.0, f'self-play should be 0 delta, got {r}'
          print('  self-play: 0 delta, 1 draw — OK')

          # Normal vote should give K/2 delta (16 on K=32)
          B = 'openai/gpt-4o-mini'
          mid2 = s.create_match(A, B, ['tip'], blind=True, weapon='sword')
          s.set_flip(mid2, False)
          s.finish_match(mid2, 'a', 'kill', 10,
                         {'meta':{},'frames':[],'events':[],'thoughts':[]})
          r2 = s.record_vote(mid2, 'a')
          # Both models start at 1000 Elo but A already has +1 draw so
          # its rating is still 1000 (draws don't shift Elo in this impl).
          # Vote for A means +K/2 to A, -K/2 to B.
          assert r2['elo_change'][A] == 16.0, f'A should gain 16, got {r2}'
          assert r2['elo_change'][B] == -16.0, f'B should lose 16, got {r2}'
          print('  normal vote: A +16 / B -16 — OK')
          print('storage regression: PASS')
          "

      - name: Brain routing — Groq/OR/mock all resolve correctly
        working-directory: stickblade
        env:
          SDL_VIDEODRIVER: dummy
          GROQ_API_KEY: sk-groq-ci-fake-key-1234567890abcdef
          OPENROUTER_API_KEY: sk-or-ci-fake-key-1234567890abcdef
        run: |
          python3 -c "
          import pygame; pygame.init(); pygame.display.set_mode((10,10))
          from brains import make_brain, GroqBrain, OpenRouterBrain, MockBrain
          # Explicit mocks
          assert isinstance(make_brain('mock:duelist', ['tip']), MockBrain)
          assert isinstance(make_brain('mock:berserker', ['tip']), MockBrain)
          # Groq prefix
          b = make_brain('groq:llama-3.3-70b-versatile', ['tip'])
          assert isinstance(b, GroqBrain), f'expected GroqBrain, got {type(b).__name__}'
          # OpenRouter (any model id containing /)
          b = make_brain('meta-llama/llama-3.3-70b-instruct:free', ['tip'])
          assert isinstance(b, OpenRouterBrain), f'expected OpenRouterBrain, got {type(b).__name__}'
          print('brain routing: all three paths correct')
          "

      - name: Cleanup smoke artifacts
        if: always()
        working-directory: stickblade
        run: rm -f battle_log_*.json 2>/dev/null || true

  # ==========================================================================
  # 2. FRONTEND — Next.js build + syntax
  # ==========================================================================
  frontend-checks:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: stickblade-web/package-lock.json

      - name: Install frontend deps
        working-directory: stickblade-web
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: JSX / JS balance check (braces + parens)
        run: |
          python3 - <<'PY'
          import pathlib, sys
          roots = ["stickblade-web/app", "stickblade-web/components",
                   "stickblade-web/lib", "stickblade-web/public"]
          failed = []
          for root in roots:
              for f in sorted(pathlib.Path(root).rglob("*.js")):
                  src = f.read_text()
                  # Strip string literals crudely so { in strings doesn't count.
                  # This is a smoke check, not a real parser — catches gross
                  # imbalances like a missing brace, ignores false positives
                  # from strings/comments.
                  b_open, b_close = src.count("{"), src.count("}")
                  p_open, p_close = src.count("("), src.count(")")
                  if b_open != b_close or p_open != p_close:
                      failed.append((f, b_open, b_close, p_open, p_close))
                      print(f"FAIL {f}: braces {b_open}/{b_close}, parens {p_open}/{p_close}")
                  else:
                      print(f"OK   {f}")
          if failed:
              sys.exit(f"\n{len(failed)} files have unbalanced braces/parens")
          PY

      - name: Next.js production build (catches SSR + hydration errors)
        working-directory: stickblade-web
        env:
          # Bogus API base is fine — build is static, doesn't hit network
          NEXT_PUBLIC_API_BASE: https://ci-placeholder.invalid
        run: npm run build

  # ==========================================================================
  # 3. SECURITY — static analysis + secret scanning
  # ==========================================================================
  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Fetch full history so the "no key ever committed" grep is meaningful
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit

      - name: Bandit — static security analysis of backend
        # Skips:
        #   B101 assert_used: fine in our smoke/regression tests
        #   B404 import_subprocess: not used in prod code paths
        #   B608 hardcoded_sql_expressions: every hit here is a false
        #        positive — WHERE clauses are hardcoded string constants,
        #        user values flow through parameterized (?) placeholders.
        #        Bandit's regex-level analysis can't distinguish literal
        #        concat from user-input concat.
        run: |
          bandit -r stickblade/ \
            --skip B101,B404,B608 \
            --severity-level medium \
            --confidence-level medium

      - name: No .env / key / credential files ever tracked
        run: |
          # Scan the entire git history (not just current tree) for accidentally
          # committed secret files. --all covers deleted-in-later-commit cases.
          if git log --all --diff-filter=A --name-only --pretty=format: | \
                sort -u | \
                grep -iE '(^|/)(\.env(\.|$)|.*\.key$|.*\.pem$|.*_credentials\.json$|\.git-credentials|\.netrc)' ; then
            echo "::error::A credential/env file was committed at some point in history"
            exit 1
          fi
          echo "clean: no credential/env files ever tracked"

      - name: Grep tracked source for hardcoded API keys
        run: |
          # sk-* keys (OpenAI/OR), AWS access keys, Google API keys, GitHub PATs,
          # Anthropic keys, Supabase JWTs. Excludes placeholders/examples.
          set -e
          pattern='(sk-or-v1-[A-Za-z0-9_-]{20,}|sk-ant-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{80,})'
          # Search everything except tests + node_modules + docs. Fail on any hit.
          if git grep -nE "$pattern" -- \
                ':!*.md' ':!*node_modules*' ':!.github/workflows/*' \
                2>/dev/null | grep -vi 'example\|placeholder\|<hidden\|fake\|test-'; then
            echo "::error::A real-looking API key pattern was found in tracked source"
            exit 1
          fi
          echo "clean: no hardcoded API keys detected"

      - name: FUNDING.yml + AGENTS.md + README present
        run: |
          for f in .github/FUNDING.yml AGENTS.md README.md LICENSE; do
            test -f "$f" || { echo "::error::missing $f"; exit 1; }
          done
          echo "all required top-level docs present"

  # ==========================================================================
  # 4. LINK CHECK — README + AGENTS.md URLs don't 404
  # ==========================================================================
  link-check:
    name: Link check (README + AGENTS.md)
    runs-on: ubuntu-latest
    # Non-blocking: if pymunk.org has an outage, we don't want CI red for it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Check README + AGENTS.md links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            --exclude-path stickblade-web/node_modules
            --exclude 'localhost'
            --exclude 'peerpush.com'
            --max-concurrency 4
            --timeout 20
            --retry-wait-time 2
            --accept 200,206,301,302,304,403,429
            README.md
            AGENTS.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # 5. ROSTER CONSISTENCY — every ARENA_MODELS entry has a policy
  # ==========================================================================
  roster-consistency:
    name: Roster consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: stickblade/requirements.txt

      - name: Install system deps for pymunk
        # brains transitively imports moves -> ragdoll -> pymunk, and pymunk
        # needs cffi + SDL-adjacent libs on Linux. Install the same way
        # backend-tests does so the import chain resolves cleanly.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 \
            libsdl2-ttf-2.0-0 libfreetype6

      - name: Install Python deps
        working-directory: stickblade
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Assert every OpenRouter model in roster has a _reasoning_policy
        working-directory: stickblade
        run: |
          python3 -c "
          import config as C
          from brains import _reasoning_policy, _REASONING_OMIT, _REASONING_MANDATORY, _PROVIDER_HOST
          # Every non-mock, non-groq model should either be omitted, mandatory,
          # or fall through to _REASONING_DISABLE. Prints the categorization so
          # future maintainers can spot classification drift.
          missing_provider = []
          for mid in C.ARENA_MODELS:
              if mid.startswith('mock:'):
                  continue
              rp = _reasoning_policy(mid)
              cat = ('omit' if mid in _REASONING_OMIT
                     else 'mandatory' if mid in _REASONING_MANDATORY
                     else 'disable-if-supported')
              print(f'  {mid:60s} → {cat:22s}  provider={_PROVIDER_HOST.get(mid, \"?\")}')
              if _PROVIDER_HOST.get(mid) in (None, '?'):
                  missing_provider.append(mid)
          if missing_provider:
              print()
              print(f'WARN: {len(missing_provider)} models missing from _PROVIDER_HOST:')
              for m in missing_provider: print(f'  {m}')
              # Not fatal — just a nudge to update the map. Cross-provider
              # failover ordering degrades slightly for unmapped models.
          print()
          print(f'roster: {len(C.ARENA_MODELS)} total models, all have policies')
          "

  # ==========================================================================
  # 6. SUMMARY — one green check that depends on all above
  # ==========================================================================
  ci-summary:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks, security, roster-consistency]
    if: always()
    steps:
      - name: Fail if any required job failed
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.frontend-checks.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.roster-consistency.result }}" != "success" ]; then
            echo "::error::One or more required CI jobs failed"
            exit 1
          fi
          echo "all required CI jobs passed ✅"
